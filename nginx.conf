events {}

http {
    server {
        listen 8080;

        # WebSocket -> V2Ray
        location /vless {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check page
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Status</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; background: white; padding: 40px 60px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .dot { width: 16px; height: 16px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; }
    h1 { color: #22c55e; margin: 0 0 8px; }
    p { color: #888; margin: 0; }
  </style>
</head>
<body>
  <div class="box">
    <span class="dot"></span>
    <h1>All systems operational</h1>
    <p>Server is running normally</p>
  </div>
</body>
</html>';
        }
    }
}
