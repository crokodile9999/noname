events {}

http {
    server {
        listen 8080;

        # WebSocket -> V2Ray
        location /vless {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Status page
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>VPN Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
  .card { background: #1e293b; border-radius: 16px; padding: 32px; max-width: 480px; width: 100%; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
  .status { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
  .dot { width: 14px; height: 14px; border-radius: 50%; background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.5} }
  h1 { font-size: 22px; color: #22c55e; }
  .divider { height: 1px; background: #334155; margin: 20px 0; }
  .row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; font-size: 14px; }
  .label { color: #94a3b8; }
  .value { color: #e2e8f0; font-weight: 500; }
  .value.loading { color: #475569; }
  .btn { width: 100%; margin-top: 24px; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; transition: background 0.2s; }
  .btn:hover { background: #2563eb; }
  .btn:disabled { background: #1e40af; cursor: not-allowed; }
  .result { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 13px; display: none; }
  .result.ok { background: #14532d; color: #86efac; }
  .result.err { background: #450a0a; color: #fca5a5; }
</style>
</head>
<body>
<div class="card">
  <div class="status">
    <div class="dot"></div>
    <h1>ВПН работает</h1>
  </div>

  <div class="divider"></div>

  <div class="row"><span class="label">Сервер</span><span class="value" id="host"></span></div>
  <div class="row"><span class="label">Время сервера</span><span class="value" id="time"></span></div>
  <div class="row"><span class="label">Ваш IP</span><span class="value loading" id="ip">загрузка...</span></div>
  <div class="row"><span class="label">Город</span><span class="value loading" id="city">загрузка...</span></div>
  <div class="row"><span class="label">Провайдер</span><span class="value loading" id="isp">загрузка...</span></div>
  <div class="row"><span class="label">Задержка до сервера</span><span class="value loading" id="ping">загрузка...</span></div>

  <div class="divider"></div>

  <button class="btn" id="btn" onclick="checkConnection()">Проверить соединение</button>
  <div class="result" id="result"></div>
</div>

<script>
  document.getElementById("host").textContent = location.hostname;
  document.getElementById("time").textContent = new Date().toLocaleString("ru-RU");

  // Ping
  const t0 = performance.now();
  fetch("/vless", { method: "GET" }).catch(() => {}).finally(() => {
    const ping = Math.round(performance.now() - t0);
    document.getElementById("ping").textContent = ping + " мс";
    document.getElementById("ping").classList.remove("loading");
  });

  // IP info
  fetch("https://ipapi.co/json/")
    .then(r => r.json())
    .then(d => {
      document.getElementById("ip").textContent = d.ip || "—";
      document.getElementById("city").textContent = (d.city || "?") + ", " + (d.country_name || "?");
      document.getElementById("isp").textContent = d.org || "—";
      ["ip","city","isp"].forEach(id => document.getElementById(id).classList.remove("loading"));
    })
    .catch(() => {
      ["ip","city","isp"].forEach(id => {
        document.getElementById(id).textContent = "ошибка";
        document.getElementById(id).classList.remove("loading");
      });
    });

  function checkConnection() {
    const btn = document.getElementById("btn");
    const result = document.getElementById("result");
    btn.disabled = true;
    btn.textContent = "Проверяем...";
    result.style.display = "none";

    fetch("https://ipapi.co/json/")
      .then(r => r.json())
      .then(d => {
        result.className = "result ok";
        result.textContent = "✓ Соединение работает. Ваш IP: " + d.ip + " (" + (d.country_name || "?") + ")";
        result.style.display = "block";
      })
      .catch(() => {
        result.className = "result err";
        result.textContent = "✗ Нет соединения с интернетом через VPN";
        result.style.display = "block";
      })
      .finally(() => {
        btn.disabled = false;
        btn.textContent = "Проверить соединение";
      });
  }
</script>
</body>
</html>';
        }
    }
}
