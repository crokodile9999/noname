events {}

http {
    server {
        listen 8080;

        # WebSocket -> V2Ray
        location /vless {
            proxy_pass http://127.0.0.1:10000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Health check page
        location / {
            default_type text/html;
            return 200 '<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Status</title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; background: #f5f5f5; }
    .box { text-align: center; background: white; padding: 40px 60px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    .dot { width: 16px; height: 16px; background: #22c55e; border-radius: 50%; display: inline-block; margin-right: 8px; }
    h1 { color: #22c55e; margin: 0 0 8px; }
    p { color: #888; margin: 0 0 16px; }
    .debug { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; text-align: left; font-family: monospace; font-size: 13px; color: #555; }
    .debug div { margin: 4px 0; }
    .debug b { color: #333; }
  </style>
</head>
<body>
  <div class="box">
    <span class="dot"></span>
    <h1>VPN работает</h1>
    <p>Nginx and the tunnel endpoint are up</p>
    <div class="debug">
      <div><b>Server time:</b> $time_local</div>
      <div><b>Your IP:</b> $remote_addr</div>
      <div><b>Host header:</b> $host</div>
      <div><b>Request:</b> $request</div>
      <div><b>Scheme:</b> $scheme</div>
      <div><b>Nginx:</b> $nginx_version</div>
    </div>
  </div>
</body>
</html>';
        }
    }
}
